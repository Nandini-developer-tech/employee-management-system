<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <style>

        
        body{
            margin:0;
            padding-top:70px;
            font-family:Arial;
	    background-color:pink;
        }

        .navbar{
            background:black;
            padding:15px;
            position:fixed;
            top:0;
            width:100%;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-size:18px;
        }

        .navbar a:hover{
            color:yellow;
        }

        h1{
            text-align:center;
        }

        form{
            text-align:center;
        }
    </style>
</head>

<body>

    <h1>Employee List</h1>

    <table border="1" cellpadding="10" style="margin:auto; text-align:center; background-color: gray">

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Salary</th>
        </tr>

        {% for emp in employees %}

        <tr>
            <td>{{ emp[0] }}</td>
            <td>{{ emp[1] }}</td>
            <td>{{ emp[2] }}</td>
            <td>{{ emp[3] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
